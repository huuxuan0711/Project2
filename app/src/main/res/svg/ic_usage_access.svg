<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Phone outline -->
  <rect x="50" y="20" width="80" height="140" rx="12"
        fill="white"
        stroke="#5C6BC0"
        stroke-width="2.5"/>

  <rect x="55" y="30" width="70" height="100" rx="4"
        fill="#F6F7FB"/>

  <!-- Analytics lines -->
  <line x1="65" y1="50" x2="95" y2="50"
        stroke="#5C6BC0"
        stroke-width="2"
        stroke-linecap="round"/>

  <line x1="65" y1="65" x2="110" y2="65"
        stroke="#5C6BC0"
        stroke-width="2"
        stroke-linecap="round"/>

  <line x1="65" y1="80" x2="85" y2="80"
        stroke="#5C6BC0"
        stroke-width="2"
        stroke-linecap="round"/>

  <line x1="65" y1="95" x2="105" y2="95"
        stroke="#5C6BC0"
        stroke-width="2"
        stroke-linecap="round"/>

  <line x1="65" y1="110" x2="90" y2="110"
        stroke="#5C6BC0"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- Signal arcs (left) -->
  <path d="M 30 70 Q 30 50, 45 40"
        stroke="#5C6BC0"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"
        opacity="0.4"/>

  <path d="M 25 85 Q 20 60, 40 35"
        stroke="#5C6BC0"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"
        opacity="0.3"/>

  <!-- Signal arcs (right) -->
  <path d="M 150 70 Q 150 50, 135 40"
        stroke="#5C6BC0"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"
        opacity="0.4"/>

  <path d="M 155 85 Q 160 60, 140 35"
        stroke="#5C6BC0"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"
        opacity="0.3"/>

  <!-- Home indicator -->
  <rect x="75" y="145" width="30" height="4" rx="2"
        fill="#5C6BC0"
        opacity="0.3"/>

</svg>